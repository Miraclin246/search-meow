<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search MEOW!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <span class="welcome">Welcome Agent Miraclin!</span>
    <div class="top-right">
      <div class="kittymail">
        <img src="assets/kitty-mail.png" alt="Kittymail" class="icon">
        <strong>KittyMail</strong>
      </div>
      <div class="profile">
        <div class="profile-frame">
          <img src="assets/profile-placeholder.png" alt="Profile Picture" class="profile-pic">
          <img src="assets/cat-ears.png" alt="Cat Ears Frame" class="cat-ears">
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="search-container">
      <h1 class="logo">Search MEOW!</h1>
      <p class="agent-text">Ask me anything and I <em>may</em> give you an answer.</p>
      <div class="search-bar">
        <img src="assets/kitty-magnify.png" alt="Kitty Magnifying Glass" class="icon" id="searchIcon">
        <input type="text" id="searchInput" placeholder="Ask me anything...">
        <img src="assets/kitty-camera.png" alt="Kitty Camera" class="icon" id="cameraIcon">
        <img src="assets/kitty-mic.png" alt="Kitty Microphone" class="icon" id="micIcon">
      </div>
      <p class="funny-text">Intel accuracy depends on belly rubs… the more you give, the smarter I get! 🐾</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
